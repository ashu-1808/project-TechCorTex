<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Techcortex - Industry Oriented Training</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // Customizing the 'zinc' palette for a deeper, richer dark mode if needed, 
              // or relying on defaults. Here we ensure 950 is a rich dark backing.
              background: '#09090b', // Zinc 950
              surface: '#18181b',    // Zinc 900
              primary: '#14b8a6',    // Teal 500
              primaryDark: '#0f766e', // Teal 700
            },
            animation: {
              'text-shimmer': 'text-shimmer 3s ease-in-out infinite alternate',
            },
            keyframes: {
              'text-shimmer': {
                '0%': { 'background-position': '0% 50%' },
                '100%': { 'background-position': '100% 50%' },
              }
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #09090b; /* Zinc 950 */
        color: #f4f4f5; /* Zinc 100 */
      }
      .font-brand {
        font-family: 'Space Grotesk', sans-serif;
      }
      .font-fancy {
        font-family: 'Dancing Script', cursive;
      }
      .font-jazz {
        font-family: 'Caveat', cursive;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #18181b; /* Zinc 900 */
      }
      ::-webkit-scrollbar-thumb {
        background: #3f3f46; /* Zinc 700 */
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #52525b; /* Zinc 600 */
      }
    </style>

    "react-hook-form": "https://esm.sh/react-hook-form@^7.70.0"
  }
}
</script>
